<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudflare D1 Todo Demo</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #111827;
      background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.20), transparent 34%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.16), transparent 34%),
        #f3f4f6;
    }

    .app {
      width: min(720px, 100%);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 55px rgba(15, 23, 42, 0.16);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.45;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 8px 10px;
      background: #ecfeff;
      color: #155e75;
      border: 1px solid #a5f3fc;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    form {
      display: flex;
      gap: 10px;
      margin: 20px 0 16px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      font-size: 16px;
      padding: 14px 15px;
      border: 1px solid #d1d5db;
      border-radius: 15px;
      background: white;
      color: #111827;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
    }

    button {
      border: 0;
      border-radius: 15px;
      padding: 13px 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: #eef2ff;
      color: #312e81;
    }

    button.danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 0 16px;
    }

    .stat {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 15px;
      padding: 12px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 17px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    li.done {
      background: #f9fafb;
    }

    .check {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .todo-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.35;
    }

    .done .todo-text {
      color: #9ca3af;
      text-decoration: line-through;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      padding: 28px 18px;
      border: 1px dashed #d1d5db;
      border-radius: 17px;
      background: #f9fafb;
    }

    .status {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.45;
    }

    .error {
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: 14px;
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .app {
        padding: 17px;
        border-radius: 20px;
      }

      .topbar {
        display: block;
      }

      .badge {
        display: inline-block;
        margin-top: 12px;
      }

      form {
        flex-direction: column;
      }

      form button {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      li {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>Todo List</h1>
        <p class="sub">Static site on Cloudflare Pages, API on Pages Functions, data saved in Cloudflare D1.</p>
      </div>
      <div class="badge">D1 demo</div>
    </div>

    <form id="todoForm">
      <input id="todoInput" type="text" autocomplete="off" maxlength="300" placeholder="Add a todo...">
      <button type="submit">Add</button>
    </form>

    <section class="stats" aria-label="Todo stats">
      <div class="stat"><strong id="totalCount">0</strong><span>Total</span></div>
      <div class="stat"><strong id="openCount">0</strong><span>Open</span></div>
      <div class="stat"><strong id="doneCount">0</strong><span>Done</span></div>
    </section>

    <ul id="todoList"></ul>
    <div id="status" class="status">Loading...</div>
  </main>

  <script>
    const form = document.getElementById("todoForm");
    const input = document.getElementById("todoInput");
    const list = document.getElementById("todoList");
    const statusEl = document.getElementById("status");
    const totalCount = document.getElementById("totalCount");
    const openCount = document.getElementById("openCount");
    const doneCount = document.getElementById("doneCount");

    let todos = [];
    let busy = false;

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateStats() {
      const total = todos.length;
      const done = todos.filter(function(todo) { return todo.completed; }).length;
      const open = total - done;

      totalCount.textContent = total;
      openCount.textContent = open;
      doneCount.textContent = done;
    }

    function render() {
      list.innerHTML = "";
      updateStats();

      if (!todos.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No todos yet. Add one above.";
        list.appendChild(empty);
        return;
      }

      for (const todo of todos) {
        const item = document.createElement("li");
        if (todo.completed) {
          item.classList.add("done");
        }

        item.innerHTML = [
          '<input class="check" type="checkbox" ' + (todo.completed ? "checked" : "") + ' data-action="toggle" data-id="' + todo.id + '">',
          '<span class="todo-text">' + escapeHtml(todo.text) + '</span>',
          '<button class="danger" data-action="delete" data-id="' + todo.id + '">Delete</button>'
        ].join("");

        list.appendChild(item);
      }
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      let data = null;

      try {
        data = await response.json();
      } catch (err) {
        throw new Error("The server did not return JSON. Check the Cloudflare Pages Function and D1 binding.");
      }

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Request failed");
      }

      return data;
    }

    async function loadTodos() {
      const data = await requestJson("/api/todos");
      todos = data.todos || [];
      render();
      setStatus("Saved in Cloudflare D1. Refresh the page to confirm persistence.", false);
    }

    async function addTodo(text) {
      await requestJson("/api/todos", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text: text })
      });
      await loadTodos();
    }

    async function toggleTodo(id, completed) {
      await requestJson("/api/todos", {
        method: "PATCH",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ id: id, completed: completed })
      });
      await loadTodos();
    }

    async function deleteTodo(id) {
      await requestJson("/api/todos?id=" + encodeURIComponent(id), {
        method: "DELETE"
      });
      await loadTodos();
    }

    async function runSafely(fn) {
      if (busy) {
        return;
      }

      busy = true;
      setStatus("Working...", false);

      try {
        await fn();
      } catch (err) {
        setStatus(err.message, true);
      } finally {
        busy = false;
      }
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      input.value = "";
      runSafely(function() {
        return addTodo(text);
      });
    });

    list.addEventListener("click", function(event) {
      const target = event.target;
      const action = target.getAttribute("data-action");
      const id = Number(target.getAttribute("data-id"));

      if (!action || !id) {
        return;
      }

      if (action === "toggle") {
        runSafely(function() {
          return toggleTodo(id, target.checked);
        });
      }

      if (action === "delete") {
        runSafely(function() {
          return deleteTodo(id);
        });
      }
    });

    loadTodos().catch(function(err) {
      setStatus(err.message, true);
      render();
    });
  </script>
</body>
</html>
